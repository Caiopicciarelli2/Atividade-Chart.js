<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Implementando o Chart.js</title>
</head>

<body>
    <div class="container-graficos">
        <div class="container-title">
            <h1>By Caiopicciarelli</h1>
        </div>
        <div class="content">
            <canvas id="myChart"></canvas>
            <canvas id="myChart2"></canvas>
        </div>
    </div>
</body>

</html>

<style>
    .container-graficos {
        display: flex;
        align-items: center;
        justify-content: space-evenly;
        flex-direction: column;
        width: 100%;
        height: 98vh;
    }

    .container-title {
        height: 10%;
    }

    .content {
        display: flex;
        align-items: center;
        justify-content: space-evenly;
        width: 100%;
        height: 60%;
    }

    .container-graficos canvas {
        max-width: 45%;
        max-height: 90%;
    }
</style>

<script>
    const grafico_linha = document.getElementById('myChart');
    const grafico_colunas = document.getElementById('myChart2');

    new Chart(grafico_linha, {
        type: 'line', // bar para gráficos de colunas, pizza para gráficos de pizza || + tipos na documentação do chart.js 
        data: {
            labels:
                [
                    '12:00', // trocando os valores do vetor
                    '13:00',
                    '14:00',
                    '15:00',
                    '16:00',
                    '17:00'
                ],
            datasets: [
                {
                    label:
                        [
                            'Temperatura'
                        ],
                    data:
                        [
                            30,
                            29,
                            28,
                            25,
                            22,
                            23
                        ],
                    borderWidth: 3,
                    borderRadius: 9, // Adicionando uma borda arredondada para deixar mais suave
                    backgroundColor: 'red'
                },
                {
                    label:
                        [
                            'Umidade'
                        ],
                    data:
                        [
                            80,
                            82,
                            80,
                            85,
                            80,
                            83
                        ],
                    borderWidth: 3,
                    borderRadius: 9, // Adicionando uma borda arredondada para deixar mais suave
                    backgroundColor: 'blue'
                }
            ]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });

    new Chart(grafico_colunas, {
        type: 'bar', // bar para gráficos de colunas, pizza para gráficos de pizza || + tipos na documentação do chart.js 
        data: {
            labels:
                [
                    'Janeiro', // trocando os valores do vetor
                    'Fevereiro',
                    'Março',
                    'Abril',
                    'Maio',
                    'Junho'
                ],
            datasets: [
                {
                    label: 'Temperatura Média',
                    data:
                        [
                            22,
                            24,
                            27,
                            23,
                            20,
                            18
                        ],
                    borderWidth: 3,
                    borderRadius: 3, // Adicionando uma borda arredondada para deixar mais suave
                    backgroundColor: 'red'
                },
                {
                    label: 'Umidade Média',
                    data:
                        [
                            90,
                            89,
                            93,
                            87,
                            88,
                            82
                        ],
                    borderWidth: 3,
                    borderRadius: 3, // Adicionando uma borda arredondada para deixar mais suave
                    backgroundColor: 'blue'
                }
            ]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
</script>
